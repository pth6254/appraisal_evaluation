services:

  # ────────────────────────────────────────────
  #  pgvector — PostgreSQL + pgvector 익스텐션
  # ────────────────────────────────────────────
  pgvector:
    image: ankane/pgvector:latest
    container_name: property_concierge_pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: real_estate_db
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d real_estate_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ────────────────────────────────────────────
  #  FastAPI 백엔드
  # ────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: property_concierge_backend:latest
    container_name: property_concierge_backend
    restart: unless-stopped
    depends_on:
      pgvector:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PG_CONNECTION_STRING: postgresql://postgres:password@pgvector:5432/real_estate_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./api:/app/api
      - ./schemas:/app/schemas
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ────────────────────────────────────────────
  #  Next.js 프론트엔드
  # ────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: property_concierge_frontend:latest
    container_name: property_concierge_frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"

volumes:
  pgvector_data:
